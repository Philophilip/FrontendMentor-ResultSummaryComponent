<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!--Google Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Results summary component</title>

  <!--CsS-->
  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <div class="main-container">
    <!--Result Container-->
    <div class="result-container">
      <h4>Your Result</h4>

      <div class="circle">
        <h1>76</h1>
        <span>of 100</span>
      </div>

      <div class="great">
        <h3>Great</h3>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </div>

    <!--Summary Container-->
    <div class="summary-container">
      <div class="summary-head">
        <h4> Summary</h4>
      </div>

      <div class="reaction-container mark">
        <p><img src="./assets/images/icon-reaction.svg" alt="Reaction icon">Reaction</p>
        <p class="percent">80 <span>/ 100</span></p>
      </div>

      <div class="memory-container mark">
        <p> <img src="./assets/images/icon-memory.svg" alt="Memory icon">Memory</p>
        <p class="percent">92 <span>/ 100</span></p>
      </div>

      <div class="verbal-container mark">
        <p> <img src="./assets/images/icon-verbal.svg" alt="Verbal Icon">Verbal</p>
        <p class="percent">61 <span>/ 100</span></p>
      </div>

      <div class="visual-container mark">
        <p><img src="./assets/images/icon-visual.svg" alt="Visual Icon">Visual</p>
        <p class="percent">72 <span>/ 100</span></p>
      </div>

      <button type="button">Continue </button>
    </div>

  </div>

  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://project-1-personal-portfolio.vercel.app/">Philo Yesudas Philip</a>.
  </footer>
</body>

</html>
